<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wallet - Liquid Pro</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
            --text: #ffffff;
            --primary: #60a5fa;
            --success: #34d399;
            --danger: #fb7185;
            --warning: #fbbf24;
            --purple: #d8b4fe;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            background-attachment: fixed; margin: 0; padding: 0;
            color: var(--text); min-height: 100vh; overflow-x: hidden;
        }

        /* --- LOADING SCREEN --- */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; display: flex; justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .loader-container { position: relative; text-align: center; }
        .liquid-ball {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px; background: var(--primary);
            filter: blur(25px); border-radius: 45% 55% 50% 50%;
            animation: liquidOrbit 3s infinite linear, pulse 2s infinite ease-in-out; opacity: 0.5;
        }
        .app-name-loader { position: relative; z-index: 10; font-size: 1.6rem; letter-spacing: 4px; text-transform: uppercase; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        @keyframes liquidOrbit { 0% { border-radius: 45% 55% 50% 50%; transform: translate(-50%, -50%) rotate(0deg); } 100% { border-radius: 45% 55% 50% 50%; transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.3); } }
        body.loaded #loading-screen { opacity: 0; visibility: hidden; }

        /* --- HEADER --- */
        .header-stats {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 25px 20px; border-bottom: 1px solid var(--glass-border); border-radius: 0 0 30px 30px;
            position: sticky; top: 0; z-index: 100;
        }
        .total-box { text-align: center; margin-bottom: 25px; }
        .total-box small { opacity: 0.6; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; }
        .total-box h1 { margin: 8px 0; font-size: 2.4rem; text-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .stat-item { background: var(--glass); padding: 12px 5px; border-radius: 20px; text-align: center; border: 1px solid var(--glass-border); }
        .stat-item small { font-size: 0.6rem; display: block; margin-bottom: 4px; color: #cbd5e1; }
        .stat-item b { font-size: 0.85rem; }

        /* --- CONTENT --- */
        .container { padding: 25px 20px 120px 20px; }
        .page { display: none; animation: glassFade 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes glassFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 25px; border-radius: 30px; border: 1px solid var(--glass-border); margin-bottom: 20px; }
        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 8px; color: #e2e8f0; margin-left: 5px; }
        input, select { width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); border-radius: 18px; font-size: 1rem; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.12); }
        select option { background: #1e1b4b; }

        .btn { padding: 16px; border: none; border-radius: 20px; font-weight: 600; width: 100%; font-size: 1rem; cursor: pointer; color: white; transition: 0.2s; }
        .btn-primary { background: linear-gradient(90deg, #3b82f6, #2563eb); }
        .btn-danger { background: linear-gradient(90deg, #f43f5e, #e11d48); }
        .btn:active { transform: scale(0.96); }

        /* --- INSIGHTS SPECIFIC --- */
        .progress-container { background: rgba(0,0,0,0.2); height: 20px; border-radius: 10px; margin: 15px 0; overflow: hidden; border: 1px solid var(--glass-border); }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--success)); width: 0%; transition: 1s ease-in-out; }
        .health-card { padding: 15px; border-radius: 20px; text-align: center; font-size: 0.9rem; margin-top: 10px; border: 1px solid var(--glass-border); }
        .health-good { background: rgba(52, 211, 153, 0.1); color: var(--success); }
        .health-bad { background: rgba(251, 113, 133, 0.1); color: var(--danger); animation: pulseAlert 2s infinite; }
        @keyframes pulseAlert { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .mini-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; border: 1px solid var(--glass-border); }
        .mini-card small { font-size: 0.65rem; color: #94a3b8; }
        .mini-card div { font-size: 1rem; font-weight: bold; margin-top: 5px; }

        /* --- NAVIGATION --- */
        .nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 12px 0; border: 1px solid var(--glass-border); border-radius: 25px; z-index: 1000; }
        .nav-btn { border: none; background: none; color: #94a3b8; font-size: 0.65rem; cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .nav-btn.active { color: #fff; opacity: 1; transform: translateY(-5px); }
        .nav-btn div { font-size: 1.3rem; margin-bottom: 4px; }

        .log-card { background: rgba(255, 255, 255, 0.05); padding: 18px; border-radius: 22px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .log-amt { font-weight: bold; }
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-container"><div class="liquid-ball"></div><div class="app-name-loader">My Wallet</div></div>
    </div>

    <div class="header-stats">
        <div class="total-box"><small>Total Balance</small><h1 id="totalCash">0 K</h1></div>
        <div class="stat-row">
            <div class="stat-item"><small>အရင်း</small><b id="capVal" style="color: var(--primary);">0 K</b></div>
            <div class="stat-item"><small>စုမိငွေ (70%)</small><b id="savedVal" style="color: var(--purple);">0 K</b></div>
            <div class="stat-item"><small>သုံးနိုင်ငွေ (30%)</small><b id="spendVal" style="color: var(--warning);">0 K</b></div>
        </div>
    </div>

    <div class="container">
        <section id="page-input" class="page active">
            <div class="card">
                <h3 style="margin: 0 0 20px 0; text-align: center;">New Entry ✨</h3>
                <div class="input-group">
                    <label>အမျိုးအစား</label>
                    <select id="entryType" onchange="toggleInputs()">
                        <option value="in">ဝင်ငွေ (အရင်း + အမြတ်)</option>
                        <option value="bus_out">လုပ်ငန်းသုံး ထွက်ငွေ</option>
                        <option value="per_out">ကိုယ်ပိုင်သုံး ထွက်ငွေ</option>
                    </select>
                </div>
                <div id="inFields">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <div class="input-group"><label>အရင်း</label><input type="number" id="inCap" placeholder="0" oninput="liveSplit()"></div>
                        <div class="input-group"><label>အမြတ်</label><input type="number" id="inProf" placeholder="0" oninput="liveSplit()"></div>
                    </div>
                </div>
                <div id="outFields" style="display:none">
                    <div class="input-group"><label>ပမာဏ</label><input type="number" id="outAmt" placeholder="0"></div>
                </div>
                <div class="input-group"><label>အကြောင်းအရာ</label><input type="text" id="desc" placeholder="..."></div>
                <button class="btn btn-primary" id="submitBtn" onclick="processEntry()">သိမ်းဆည်းမည်</button>
            </div>
        </section>

        <section id="page-history" class="page">
            <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom: 15px;">
                <h3 style="margin:0;">History 📖</h3>
                <button onclick="confirmReset()" style="color:var(--danger); border:none; background:none; font-size:0.7rem;">Reset Data</button>
            </div>
            <div id="logList"></div>
        </section>

        <section id="page-insights" class="page">
            <div class="card">
                <h3 style="margin-top:0;">Profit Goal 🎯</h3>
                <div style="display:flex; justify-content: space-between; font-size: 0.8rem; opacity: 0.8;">
                    <span>တိုးတက်မှု</span><span id="goalPercent">0%</span>
                </div>
                <div class="progress-container"><div class="progress-bar" id="goalBar"></div></div>
                <small style="color: var(--purple); cursor: pointer;" onclick="setGoal()">Set Target (Goal)</small>
            </div>

            <div id="walletHealth" class="health-card health-good">Wallet Status: Good ✅</div>

            <div class="stats-grid">
                <div class="mini-card"><small>စုစုပေါင်းအမြတ်</small><div id="statTotalProf" style="color: var(--success);">0 K</div></div>
                <div class="mini-card"><small>စုစုပေါင်းအသုံး</small><div id="statTotalSpend" style="color: var(--danger);">0 K</div></div>
            </div>
        </section>
    </div>

    <nav class="nav">
        <button class="nav-btn active" onclick="changePage('page-input', this)"><div>➕</div><span>ENTRY</span></button>
        <button class="nav-btn" onclick="changePage('page-history', this)"><div>📜</div><span>LOGS</span></button>
        <button class="nav-btn" onclick="changePage('page-insights', this)"><div>📊</div><span>INSIGHTS</span></button>
    </nav>

    <script>
        let data = JSON.parse(localStorage.getItem('my_wealth_v1')) || {
            capital: 0, savedProfit: 0, spendableProfit: 0, logs: [], 
            target: 1000000, totalProfitEver: 0, totalSpendEver: 0
        };

        window.onload = () => {
            updateUI();
            setTimeout(() => document.body.classList.add('loaded'), 1500);
        };

        function changePage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(pageId === 'page-history') renderLogs();
            if(pageId === 'page-insights') renderInsights();
        }

        function toggleInputs() {
            const type = document.getElementById('entryType').value;
            document.getElementById('inFields').style.display = type === 'in' ? 'block' : 'none';
            document.getElementById('outFields').style.display = type === 'in' ? 'none' : 'block';
            document.getElementById('submitBtn').className = type === 'in' ? "btn btn-primary" : "btn btn-danger";
        }

        function processEntry() {
            const type = document.getElementById('entryType').value;
            const desc = document.getElementById('desc').value || "No Note";
            const now = new Date();
            const timeStr = `${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')} | ${now.toLocaleDateString()}`;

            if(type === 'in') {
                const ci = parseFloat(document.getElementById('inCap').value) || 0;
                const pi = parseFloat(document.getElementById('inProf').value) || 0;
                const sPart = Math.floor(pi * 0.7);
                data.capital += ci;
                data.savedProfit += sPart;
                data.spendableProfit += (pi - sPart);
                data.totalProfitEver += pi;
                data.logs.unshift({ desc, type, amt: ci+pi, date: timeStr });
            } else {
                const amt = parseFloat(document.getElementById('outAmt').value) || 0;
                if(amt <= 0) return;
                if(type === 'bus_out') data.capital -= amt;
                else { data.spendableProfit -= amt; data.totalSpendEver += amt; }
                data.logs.unshift({ desc, type, amt, date: timeStr });
            }
            saveData(); clearForm(); alert("Saved! ✨");
        }

        function updateUI() {
            document.getElementById('capVal').innerText = data.capital.toLocaleString() + " K";
            document.getElementById('savedVal').innerText = data.savedProfit.toLocaleString() + " K";
            document.getElementById('spendVal').innerText = data.spendableProfit.toLocaleString() + " K";
            document.getElementById('totalCash').innerText = (data.capital + data.savedProfit + data.spendableProfit).toLocaleString() + " K";
        }

        function renderInsights() {
            const percent = Math.min(Math.round((data.totalProfitEver / data.target) * 100), 100);
            document.getElementById('goalPercent').innerText = percent + "%";
            document.getElementById('goalBar').style.width = percent + "%";
            document.getElementById('statTotalProf').innerText = data.totalProfitEver.toLocaleString() + " K";
            document.getElementById('statTotalSpend').innerText = data.totalSpendEver.toLocaleString() + " K";

            const health = document.getElementById('walletHealth');
            if(data.spendableProfit < 50000) {
                health.innerText = "Wallet Status: Critical (Low Cash) ⚠️";
                health.className = "health-card health-bad";
            } else {
                health.innerText = "Wallet Status: Healthy ✅";
                health.className = "health-card health-good";
            }
        }

        function setGoal() {
            const newGoal = prompt("ဒီလအတွက် အမြတ် Target (Goal) သတ်မှတ်ပါ-", data.target);
            if(newGoal) { data.target = parseFloat(newGoal); saveData(); renderInsights(); }
        }

        function renderLogs() {
            const list = document.getElementById('logList');
            list.innerHTML = data.logs.length ? data.logs.map(l => `
                <div class="log-card">
                    <div class="log-meta"><h4>${l.desc}</h4><small>${l.date}</small></div>
                    <div class="log-amt" style="color:${l.type==='in'?'var(--success)':'var(--danger)'}">${l.type==='in'?'+':'-'}${l.amt.toLocaleString()}</div>
                </div>`).join('') : '<p style="text-align:center;opacity:0.5">No records found.</p>';
        }

        function saveData() { localStorage.setItem('my_wealth_v1', JSON.stringify(data)); updateUI(); }
        function clearForm() { 
            document.getElementById('inCap').value = ''; document.getElementById('inProf').value = '';
            document.getElementById('outAmt').value = ''; document.getElementById('desc').value = '';
        }
        function confirmReset() { if(confirm("Data တွေ အကုန်ဖျက်မှာလား?")) { localStorage.clear(); location.reload(); } }
        function liveSplit() { /* Preview logic removed for clean UI, but results are calculated on save */ }
    </script>
</body>
</html>
